name: Publish Dagger Runner Image
on:
  # schedule:
  #   - cron: "0 0 * * *" # Checks every night at midnight
  workflow_dispatch: # Allows you to run it manually

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Latest Dagger Version
        id: dagger-version
        run: |
          # Fetch the latest release tag from GitHub API
          VERSION=$(curl -s https://api.github.com/repos/dagger/dagger/releases/latest | jq -r .tag_name)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest Dagger version is $VERSION"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./arc-dagger/Dockerfile.runner
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/staytunedllp/st-arc-dagger-kubectl:latest
            ghcr.io/staytunedllp/st-arc-dagger-kubectl:${{ steps.dagger-version.outputs.version }}
          build-args: |
            DAGGER_VERSION=${{ steps.dagger-version.outputs.version }}
