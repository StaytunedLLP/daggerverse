# PR Checks Workflow

name: Checks | PR

# Trigger on PR opened, synchronized, or reopened
on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel previous runs for the same PR
concurrency:
  group: ${{ github.workflow }}-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Job to run PR checks
  pr-checks:
    name: Run PR Checks
    runs-on: shr
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dagger Build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
        run: |
          dagger call -m github.com/StaytunedLLP/daggerverse@v1.4.4 checks build --source=. --node-auth-token=env:NODE_AUTH_TOKEN


      # Report the checks status
      - name: Report PR Checks Status
        run: |
          echo "## PR Checks Summary" >> $GITHUB_STEP_SUMMARY
          echo "PR checks completed for PR ${{ github.event.pull_request.number }}." >> $GITHUB_STEP_SUMMARY
          echo "All checks passed successfully." >> $GITHUB_STEP_SUMMARY
