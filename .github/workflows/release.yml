name: Release Package

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

# This workflow assumes branch protection enables "Require branches to be up to date before merging".
jobs:
  release:
    runs-on: st-arc
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Bootstrap Dagger (ARC)
        uses: staytunedllp/devops/.github/actions/dagger-bootstrap@main
        with:
          namespace: dagger
          label_selector: name=dagger-engine
          prefer_same_node: "true"

      - name: Sync PR package version
        if: github.event_name == 'pull_request'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.0"
          verb: call
          module: .
          args: >-
            release-package
            --action=sync-pr-version
            --source=.
            --github-token=env:GITHUB_TOKEN
            --repo-owner=${{ github.repository_owner }}
            --repo-name=${{ github.event.repository.name }}
            --registry-scope=staytunedllp
            --base-branch=${{ github.event.pull_request.base.ref }}
            --pr-branch=${{ github.event.pull_request.head.ref }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect synchronized version changes
        if: github.event_name == 'pull_request'
        id: pr_version_changes
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(node <<'NODE'
          const fs = require("node:fs");

          try {
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));

            if (typeof pkg.version !== "string" || pkg.version.length === 0) {
              throw new Error("package.json is missing a non-empty string version field.");
            }

            process.stdout.write(pkg.version);
          } catch (error) {
            console.error(`Failed to read package.json version: ${error.message}`);
            process.exit(1);
          }
          NODE
          )

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit synchronized version
        if: github.event_name == 'pull_request' && steps.pr_version_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cat <<EOF >/tmp/release-version-commit-msg
          chore: bump version to v${{ steps.pr_version_changes.outputs.version }}

          ---
          Release-Note: none
          Audience: dev
          EOF
          git add package.json package-lock.json
          git commit -F /tmp/release-version-commit-msg
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Publish package from main
        if: github.event_name == 'push'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.0"
          verb: call
          module: .
          args: >-
            release-package
            --action=publish
            --source=.
            --github-token=env:GITHUB_TOKEN
            --repo-owner=${{ github.repository_owner }}
            --repo-name=${{ github.event.repository.name }}
            --registry-scope=staytunedllp
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Create and push release tag
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          VERSION=$(node <<'NODE'
          const fs = require("node:fs");

          try {
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));

            if (typeof pkg.version !== "string" || pkg.version.length === 0) {
              throw new Error("package.json is missing a non-empty string version field.");
            }

            process.stdout.write(pkg.version);
          } catch (error) {
            console.error(`Failed to read package.json version: ${error.message}`);
            process.exit(1);
          }
          NODE
          )
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
