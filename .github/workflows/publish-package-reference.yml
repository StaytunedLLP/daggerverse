name: Publish Package (Reference)

# triggers: production from release-please GitHub Release + manual PR pre-release trigger
on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to publish from (must have an open PR)"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  publish:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'release' &&
        github.event.release.prerelease == false &&
        github.event.release.target_commitish == 'main'
      )
    runs-on: st-arc
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # For workflow_dispatch, checkout the requested branch; otherwise use the release commit ref.
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.ref }}

      - name: Bootstrap Dagger (ARC)
        uses: staytunedllp/devops/.github/actions/dagger-bootstrap@main
        with:
          namespace: dagger
          label_selector: name=dagger-engine
          prefer_same_node: "true"

      - name: Dagger Call (Publish Package)
        uses: dagger/dagger-for-github@v8.3.0
        with:
          version: "0.20.1"
          verb: call
          # To use in a different repo, change this module path to your published Dagger module path.
          module: github.com/StaytunedLLP/daggerverse
          args: >
            publish-package
            --source=.
            --ref="${{ github.ref }}"
            --event-name="${{ github.event_name }}"
            --github-token=env:NODE_AUTH_TOKEN
            --repo-owner="${{ github.repository_owner }}"
            --repo-name="${{ github.event.repository.name }}"
            --input-branch="${{ github.event.inputs.branch }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
