name: 🔄 Planning Lifecycle Sync

on:
  push:
    branches: [main]
    paths:
      - "src/requirement/**"
      - "src/*/requirement/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no actual changes)"
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
    runs-on: st-arc
      pull-requests: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Dependencies
        working-directory: .github/sync-issues
        run: npm ci

      - name: Compile TypeScript
        working-directory: .github/sync-issues
        run: |
          echo "🔨 Compiling TypeScript with tsgo..."
          npm run build

      - name: Run Tests
        working-directory: .github/sync-issues
        run: |
          echo "🧪 Running tests..."
          node --test dist/tests/*.test.js

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.STAYAGENT_APP_ID }}
          private-key: ${{ secrets.STAYAGENT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Sync Script
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          node .github/sync-issues/dist/src/sync-planning.js ${{ inputs.dry_run == true && '--dry-run' || '' }}
